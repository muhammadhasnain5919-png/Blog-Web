<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blog | Register</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg-color: #030303;
        --text-main: #ffffff;
        --text-muted: #8b949e;
        --glass-bg: rgba(255, 255, 255, 0.02);
        --glass-border: rgba(255, 255, 255, 0.06);
        --glass-hover: rgba(255, 255, 255, 0.05);
        --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
        --accent: #3b82f6;
        --accent-glow: rgba(59, 130, 246, 0.4);
        --accent-hover: #2563eb;
        --blob-1: rgba(59, 130, 246, 0.15);
        --blob-2: rgba(147, 51, 234, 0.15);
      }
      [data-theme="light"] {
        --bg-color: #f0f2f5;
        --text-main: #0f172a;
        --text-muted: #64748b;
        --glass-bg: rgba(255, 255, 255, 0.6);
        --glass-border: rgba(0, 0, 0, 0.05);
        --glass-hover: rgba(255, 255, 255, 0.9);
        --glass-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.08);
        --accent: #0f172a;
        --accent-glow: rgba(15, 23, 42, 0.2);
        --accent-hover: #1e293b;
        --blob-1: rgba(59, 130, 246, 0.2);
        --blob-2: rgba(147, 51, 234, 0.2);
      }
      body {
        font-family: "Inter", sans-serif;
        background-color: var(--bg-color);
        color: var(--text-main);
        overflow-x: hidden;
        transition:
          background-color 0.5s ease,
          color 0.5s ease;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }
      .ambient-light {
        position: fixed;
        border-radius: 50%;
        filter: blur(100px);
        z-index: -1;
        pointer-events: none;
        animation: float 20s infinite alternate ease-in-out;
      }
      .ambient-1 {
        top: -10%;
        left: -10%;
        width: 50vw;
        height: 50vw;
        background: var(--blob-1);
      }
      .ambient-2 {
        bottom: -20%;
        right: -10%;
        width: 60vw;
        height: 60vw;
        background: var(--blob-2);
        animation-delay: -10s;
      }
      @keyframes float {
        0% {
          transform: translate(0, 0) scale(1);
        }
        100% {
          transform: translate(5%, 5%) scale(1.1);
        }
      }
      #loader {
        position: fixed;
        inset: 0;
        background: var(--bg-color);
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 9999;
        transition:
          opacity 0.6s ease,
          visibility 0.6s;
      }
      .spinner {
        width: 40px;
        height: 40px;
        border: 3px solid var(--glass-border);
        border-top-color: var(--accent);
        border-radius: 50%;
        animation: spin 0.8s cubic-bezier(0.6, 0.2, 0.4, 0.8) infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      body.loaded #loader {
        opacity: 0;
        visibility: hidden;
      }
      h1,
      h2,
      h3,
      h4,
      h5,
      h6 {
        font-weight: 700;
        letter-spacing: -0.03em;
      }
      .text-gradient {
        background: linear-gradient(
          135deg,
          var(--text-main),
          var(--text-muted)
        );
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      .animate-up {
        opacity: 0;
        transform: translateY(30px);
        animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }
      @keyframes slideUp {
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .d-1 {
        animation-delay: 0.1s;
      }
      .d-2 {
        animation-delay: 0.2s;
      }
      .glass-panel {
        background: var(--glass-bg);
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
        border: 1px solid var(--glass-border);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.05),
          var(--glass-shadow);
        border-radius: 24px;
        transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      }
      .navbar {
        padding: 1.5rem 0;
        background: transparent;
      }
      .navbar-brand {
        font-weight: 800;
        font-size: 1.75rem;
        color: var(--text-main) !important;
        letter-spacing: -1px;
      }
      .nav-link {
        color: var(--text-muted) !important;
        font-weight: 500;
        font-size: 0.95rem;
        margin: 0 0.5rem;
        transition: color 0.3s;
      }
      .nav-link:hover {
        color: var(--text-main) !important;
      }
      .btn-glass {
        background: var(--glass-bg);
        border: 1px solid var(--glass-border);
        color: var(--text-main);
        border-radius: 12px;
        padding: 0.6rem 1.5rem;
        font-weight: 600;
        font-size: 0.9rem;
        cursor: pointer;
        transition: all 0.3s ease;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }
      .btn-glass:hover {
        background: var(--glass-hover);
        border-color: var(--accent);
        transform: translateY(-2px);
      }
      .btn-primary-custom {
        background: var(--accent);
        color: #fff;
        border: none;
      }
      .btn-primary-custom:hover {
        background: var(--accent-hover);
        box-shadow: 0 0 20px var(--accent-glow);
      }
      .btn-icon {
        width: 42px;
        height: 42px;
        padding: 0;
        border-radius: 50%;
      }
      .auth-wrapper {
        flex-grow: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem 1rem;
      }
      .auth-card {
        width: 100%;
        max-width: 440px;
        padding: 2.5rem;
      }
      .form-label {
        font-size: 0.9rem;
        font-weight: 500;
        color: var(--text-muted);
        margin-bottom: 0.5rem;
        display: block;
      }
      .form-input {
        width: 100%;
        background: var(--bg-color);
        border: 1px solid var(--glass-border);
        padding: 0.8rem 1rem;
        border-radius: 12px;
        color: var(--text-main);
        outline: none;
        transition:
          border-color 0.3s,
          box-shadow 0.3s;
        margin-bottom: 1.2rem;
      }
      .form-input:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 4px var(--accent-glow);
      }
      .auth-link {
        color: var(--accent);
        text-decoration: none;
        font-weight: 500;
        transition: color 0.3s;
      }
      .auth-link:hover {
        color: var(--accent-hover);
      }
    </style>
  </head>
  <body>
    <div id="loader">
      <div class="spinner"></div>
    </div>
    <div class="ambient-light ambient-1"></div>
    <div class="ambient-light ambient-2"></div>
    <nav class="navbar navbar-expand-lg animate-up d-1">
      <div class="container">
        <a class="navbar-brand" href="index.html">Blog</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-toggle="target"
          aria-controls="navbarNav"
          style="border-color: var(--glass-border)"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="24"
            height="24"
            fill="var(--text-main)"
            viewBox="0 0 16 16"
          >
            <path
              fill-rule="evenodd"
              d="M2.5 12a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5zm0-4a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5zm0-4a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5z"
            />
          </svg>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav me-auto ms-lg-4">
            <li class="nav-item">
              <a class="nav-link" href="index.html">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="about.html">About</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="contact.html">Contact</a>
            </li>
          </ul>
          <div class="d-flex gap-3 align-items-center mt-3 mt-lg-0">
            <button
              id="theme-toggle"
              class="btn-glass btn-icon"
              aria-label="Toggle theme"
            >
              <svg
                id="icon-sun"
                xmlns="http://www.w3.org/2000/svg"
                width="18"
                height="18"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <circle cx="12" cy="12" r="5"></circle>
                <line x1="12" y1="1" x2="12" y2="3"></line>
                <line x1="12" y1="21" x2="12" y2="23"></line>
                <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                <line x1="1" y1="12" x2="3" y2="12"></line>
                <line x1="21" y1="12" x2="23" y2="12"></line>
                <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
              </svg>
              <svg
                id="icon-moon"
                style="display: none"
                xmlns="http://www.w3.org/2000/svg"
                width="18"
                height="18"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path
                  d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"
                ></path>
              </svg>
            </button>
            <a href="login.html">
              <button class="btn-glass">Log in</button>
            </a>
          </div>
        </div>
      </div>
    </nav>
    <main class="auth-wrapper animate-up d-2">
      <div class="glass-panel auth-card">
        <h2 class="card-title text-center mb-2" style="font-size: 2rem">
          Create account
        </h2>
        <p class="text-center text-muted mb-4">Join 4,000+ developers today.</p>
        <form>
          <label class="form-label">Full Name</label>
          <input
            type="text"
            class="form-input"
            placeholder="John Doe"
            required
          />
          <label class="form-label">Email address</label>
          <input
            type="email"
            class="form-input"
            placeholder="name@domain.com"
            required
          />
          <label class="form-label">Password</label>
          <input
            type="password"
            class="form-input"
            placeholder="••••••••"
            required
          />
          <button
            type="submit"
            class="btn-glass btn-primary-custom w-100 mb-4 mt-2"
            style="padding: 0.8rem; font-size: 1rem"
          >
            Register
          </button>
          <p class="text-center text-muted m-0" style="font-size: 0.95rem">
            Already have an account?
            <a href="login.html" class="auth-link">Log in</a>
          </p>
        </form>
      </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      window.addEventListener("load", () => {
        setTimeout(() => {
          document.body.classList.add("loaded");
        }, 300);
      });
      document.addEventListener("DOMContentLoaded", () => {
        const toggleBtn = document.getElementById("theme-toggle");
        const iconSun = document.getElementById("icon-sun");
        const iconMoon = document.getElementById("icon-moon");
        const htmlTag = document.documentElement;
        const savedTheme = localStorage.getItem("zairo-theme") || "dark";
        setTheme(savedTheme);
        toggleBtn.addEventListener("click", () => {
          const newTheme =
            htmlTag.getAttribute("data-theme") === "dark" ? "light" : "dark";
          setTheme(newTheme);
        });
        function setTheme(theme) {
          htmlTag.setAttribute("data-theme", theme);
          localStorage.setItem("zairo-theme", theme);
          if (theme === "light") {
            iconSun.style.display = "none";
            iconMoon.style.display = "block";
          } else {
            iconSun.style.display = "block";
            iconMoon.style.display = "none";
          }
        }
      });
    </script>
  </body>
</html>

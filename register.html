<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blog | Register</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="Style.css" />
  </head>
  <body>
    <div id="loader">
      <div class="spinner"></div>
    </div>
    <div class="ambient-light ambient-1"></div>
    <div class="ambient-light ambient-2"></div>
    <nav class="navbar navbar-expand-lg animate-up d-1">
      <div class="container">
        <a class="navbar-brand" href="index.html">Blog</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-toggle="target"
          aria-controls="navbarNav"
          style="border-color: var(--glass-border)"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="24"
            height="24"
            fill="var(--text-main)"
            viewBox="0 0 16 16"
          >
            <path
              fill-rule="evenodd"
              d="M2.5 12a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5zm0-4a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5zm0-4a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5z"
            />
          </svg>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav me-auto ms-lg-4">
            <li class="nav-item">
              <a class="nav-link" href="index.html">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="about.html">About</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="contact.html">Contact</a>
            </li>
          </ul>
          <div class="d-flex gap-3 align-items-center mt-3 mt-lg-0">
            <button
              id="theme-toggle"
              class="btn-glass btn-icon"
              aria-label="Toggle theme"
            >
              <svg
                id="icon-sun"
                xmlns="http://www.w3.org/2000/svg"
                width="18"
                height="18"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <circle cx="12" cy="12" r="5"></circle>
                <line x1="12" y1="1" x2="12" y2="3"></line>
                <line x1="12" y1="21" x2="12" y2="23"></line>
                <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                <line x1="1" y1="12" x2="3" y2="12"></line>
                <line x1="21" y1="12" x2="23" y2="12"></line>
                <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
              </svg>
              <svg
                id="icon-moon"
                style="display: none"
                xmlns="http://www.w3.org/2000/svg"
                width="18"
                height="18"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path
                  d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"
                ></path>
              </svg>
            </button>
            <a href="login.html">
              <button class="btn-glass">Log in</button>
            </a>
          </div>
        </div>
      </div>
    </nav>
    <main class="auth-wrapper animate-up d-2">
      <div class="glass-panel auth-card">
        <h2 class="card-title text-center mb-2" style="font-size: 2rem">
          Create account
        </h2>
        <p class="text-center text-muted mb-4">Join 4,000+ developers today.</p>
        <form>
          <label class="form-label">Full Name</label>
          <input
            type="text"
            class="form-input"
            placeholder="John Doe"
            required
          />
          <label class="form-label">Email address</label>
          <input
            type="email"
            class="form-input"
            placeholder="name@domain.com"
            required
          />
          <label class="form-label">Password</label>
          <input
            type="password"
            class="form-input"
            placeholder="••••••••"
            required
          />
          <button
            type="submit"
            class="btn-glass btn-primary-custom w-100 mb-4 mt-2"
            style="padding: 0.8rem; font-size: 1rem"
          >
            Register
          </button>
          <p class="text-center text-muted m-0" style="font-size: 0.95rem">
            Already have an account?
            <a href="login.html" class="auth-link">Log in</a>
          </p>
        </form>
      </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      window.addEventListener("load", () => {
        setTimeout(() => {
          document.body.classList.add("loaded");
        }, 300);
      });
      document.addEventListener("DOMContentLoaded", () => {
        const toggleBtn = document.getElementById("theme-toggle");
        const iconSun = document.getElementById("icon-sun");
        const iconMoon = document.getElementById("icon-moon");
        const htmlTag = document.documentElement;
        const savedTheme = localStorage.getItem("zairo-theme") || "dark";
        setTheme(savedTheme);
        toggleBtn.addEventListener("click", () => {
          const newTheme =
            htmlTag.getAttribute("data-theme") === "dark" ? "light" : "dark";
          setTheme(newTheme);
        });
        function setTheme(theme) {
          htmlTag.setAttribute("data-theme", theme);
          localStorage.setItem("zairo-theme", theme);
          if (theme === "light") {
            iconSun.style.display = "none";
            iconMoon.style.display = "block";
          } else {
            iconSun.style.display = "block";
            iconMoon.style.display = "none";
          }
        }
      });
    </script>
  </body>
</html>
